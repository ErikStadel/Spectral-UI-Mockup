<!DOCTYPE html>
<html lang="de" class="h-full bg-zinc-950 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectral Processor Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        audio: {
                            transient: '#FF5252',
                            tonal: '#4AA3FF',
                            noise: '#4FD16A'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full flex flex-col font-sans select-none overflow-hidden">

    <header class="h-12 border-b border-zinc-800 bg-zinc-900 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-4">
            <span class="font-bold tracking-wider text-sm text-zinc-400">SPEKTRAL // LAB</span>
            <div class="bg-zinc-800 px-3 py-1 text-xs rounded border border-zinc-700 cursor-pointer hover:bg-zinc-750">
                Default Preset ▾
            </div>
        </div>
        <div class="flex items-center gap-6 text-xs text-zinc-400">
            <div>In: <span class="text-zinc-200">-1.2 dB</span></div>
            <div>Out: <span class="text-zinc-200">-0.8 dB</span></div>
        </div>
    </header>

    <div class="flex flex-1 min-h-0">
        
        <aside class="w-64 border-r border-zinc-800 bg-zinc-900/50 flex flex-col shrink-0">
            <div class="p-3 border-b border-zinc-800 flex items-center justify-between">
                <span class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Objekt-Datenbank</span>
                <button id="add-object-btn" class="w-6 h-6 bg-zinc-800 border border-zinc-750 rounded flex items-center justify-center text-sm font-bold hover:bg-zinc-700 hover:border-zinc-600 transition-colors">
                    +
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="object-list">
                <div class="p-2 rounded bg-zinc-800 border-l-4 border-audio-transient flex items-center justify-between cursor-pointer">
                    <span class="text-xs font-medium">Transients</span>
                    <div class="flex gap-2 text-[10px] text-zinc-500">
                        <span class="hover:text-zinc-200">S</span>
                        <span class="hover:text-zinc-200">M</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-zinc-950 p-4 flex flex-col relative min-w-0">
            <div class="flex-1 bg-zinc-900/30 border border-zinc-800 rounded flex items-center justify-center relative overflow-hidden">
                <span class="text-zinc-600 text-xs tracking-widest uppercase">Spektrogramm-Ansicht (STFT)</span>
                
                <div class="absolute border border-dashed border-sky-400 bg-sky-500/10 pointer-events-none rounded hidden" id="selection-overlay"></div>
            </div>
        </main>
    </div>

    <footer class="h-48 border-t border-zinc-800 bg-zinc-900 flex shrink-0">
        <div class="w-64 border-r border-zinc-800 p-3 flex flex-col justify-between shrink-0">
            <span class="text-xs font-semibold uppercase tracking-wider text-zinc-500">FX Module (Auswahl)</span>
            <div class="text-[11px] text-zinc-400">Wähle ein Objekt, um die FX-Kette zu editieren.</div>
        </div>
        
        <div class="flex-1 p-4 grid grid-cols-4 gap-4" id="fx-parameters">
            </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
